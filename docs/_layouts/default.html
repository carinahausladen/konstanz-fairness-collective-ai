<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <p class="tag">University of Konstanz · Summer Semester 2026</p>
      <h1><a href="{{ '/index.html' | relative_url }}">{{ site.title }}</a></h1>
      <p class="subtitle">Wednesdays · 3:15–4:45 PM</p>
      <p class="cta">Seminar materials and weekly planning hub</p>
    </header>

    <main class="content-card">
      {{ content }}
    </main>

    <footer class="site-footer">
      {% unless page.url == "/" or page.url == "/index.html" %}
      <a href="{{ '/index.html' | relative_url }}">← Back to schedule</a>
      {% endunless %}
    </footer>
  </div>
</body>
</html>
